version: "3.8"
services:
 postgres:
  image: postgres:15-alpine
  environment:
   POSTGRES_USER: user
   POSTGRES_PASSWORD: password
   POSTGRES_DB: ticket_db
  ports:
   - "5434:5432"
  volumes:
   - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Başlangıç verisi için

 redis:
  image: redis:7-alpine
  ports:
   - "6379:6379"
 

 rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # RabbitMQ iletişim portu
      - "15672:15672" # Dashboard portu (Kullanıcı: guest, Şifre: guest)
